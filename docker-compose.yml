version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dementia_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persistent face photos, embeddings, DB
      - ./ai:/app/ai              # AI modules (face_recognition, speech, etc.)
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: dementia_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped
